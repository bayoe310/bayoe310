name: Update streak stats
on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at 00:00 UTC
  push:
    paths:
      - ".github/workflows/update-streak.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117
          path: streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
